<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Login</h2>
                <p class="text-muted">Acesse sua conta para continuar</p>
            </div>

            <div class="mb-3">
                <label for="usuario" class="form-label fw-semibold">Usuário</label>
                <input type="text" id="usuario" class="form-control" placeholder="Digite seu usuário">
            </div>

            <div class="mb-4">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
            </div>

            <div class="d-flex justify-content-between">
                <button id="enviar" class="btn btn-success w-50 me-2 fw-semibold">Entrar</button>
                <button id="novo" class="btn btn-warning w-50 fw-semibold text-dark">Novo</button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-top py-3 text-center">
        <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
        <div>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-facebook"></i></a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-instagram"></i></a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-linkedin"></i></a>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
