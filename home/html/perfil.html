<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
            
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link text-secondary fw-semibold" href="../html/">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <button type="button" class="nav-link text-secondary fw-semibold dropdown-toggle border-0 bg-transparent" data-bs-toggle="dropdown">
                            Serviços
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="../../dispositivos/html/criarservico.html">Oferecendo</a></li>
                            <li><a class="dropdown-item" href="../../dispositivos/html/criarservico.html">Contratando</a></li>
                        </ul>
                    </li>
                </ul>

                <ul class="navbar-nav d-flex align-items-center">
                    <li class="nav-item">
                        <a class="nav-link text-secondary fw-semibold me-3" href="../html/perfil.html">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-danger px-3" id="logoff">Sair</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Perfil</h2>
            </div>

            <!-- FORMULÁRIO -->
            <input type="hidden" id="id">

            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Nome</label>
                <input type="text" id="nome" class="form-control" placeholder="Digite o nome completo">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="text" id="email" class="form-control" placeholder="Coloque seu Email">
            </div>

            <div class="mb-3">
                <label for="telefone" class="form-label fw-semibold">Telefone</label>
                <input type="text" id="telefone" class="form-control" placeholder="Coloque seu Número">
            </div>

            <div class="mb-3">
                <label for="usuario" class="form-label fw-semibold">Usuário</label>
                <input type="text" id="usuario" class="form-control" placeholder="Digite o nome de usuário">
            </div>

            <div class="mb-3">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="Digite a nova senha">
            </div>

            <!-- BOTÕES -->
            <div class="d-flex justify-content-between">
                <button id="enviar" class="btn btn-success w-50 me-2 fw-semibold">Salvar</button>
                <button id="voltar" class="btn btn-danger w-50 fw-semibold">Voltar</button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-top py-3 text-center">
        <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="../js/usuario_alterar.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
