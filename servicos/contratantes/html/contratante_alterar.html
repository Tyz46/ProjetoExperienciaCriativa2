<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Serviço - ConsertaJá</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../../home/css/app.css" rel="stylesheet">
</head>
<body>
<div class="site-shell">
    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="../../../home/html/index.html">
                <span class="brand-mark"><i class="bi bi-tools"></i></span>ConsertaJá
            </a>
        </div>
    </nav>

    <main class="auth-main">
        <div class="form-card">
            <div class="form-header">
                <span class="icon-box mb-3"><i class="bi bi-pencil-square"></i></span>
                <h2 class="fw-bold mb-2">Alterar Serviço</h2>
                <p class="mb-0">Atualize as informações do serviço cadastrado.</p>
            </div>

            <div class="form-body bg-white">
                <input type="hidden" id="id">

                <div class="mb-3">
                    <label for="nome" class="form-label">Nome do Serviço</label>
                    <input type="text" id="nome" class="form-control">
                </div>

                <div class="mb-3">
                    <label for="descricao" class="form-label">Descrição</label>
                    <textarea id="descricao" class="form-control"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="tipo" class="form-label">Categoria</label>
                        <select id="tipo" class="form-select">
                            <option value="Eletrica">Elétrica</option>
                            <option value="Limpeza">Limpeza</option>
                            <option value="Informatica">Informática</option>
                            <option value="Pintura">Pintura</option>
                            <option value="Encanamento">Encanamento</option>
                            <option value="Montagem">Montagem</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="valor" class="form-label">Valor</label>
                        <input type="number" step="0.01" id="valor" class="form-control">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="localidade" class="form-label">Localidade</label>
                    <input type="text" id="localidade" class="form-control">
                </div>

                <div class="d-flex justify-content-between gap-2 action-row">
                    <button id="enviar" class="btn btn-brand btn-main w-50">Salvar alterações</button>
                    <button id="voltar" class="btn btn-outline-danger btn-main w-50">Voltar</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center py-3">
        <p class="mb-0 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/contratante_alterar.js?v=origem"></script>
    <script src="../js/valida_sessao.js?v=origem"></script>
</div>
</body>
</html>
