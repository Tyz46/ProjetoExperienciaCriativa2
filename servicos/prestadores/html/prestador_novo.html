<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Novo Serviço</h2>
                <p class="text-muted">Preencha as informações para cadastrar um novo serviço</p>
            </div>

            <!-- FORMULÁRIO -->
            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Nome:</label>
                <input type="text" id="name" class="form-control" placeholder="Digite o nome do serviço:">
            </div>
            <div class="mb-3">
                <label for="type" class="form-label fw-semibold">Tipo:</label>
                <select id="type" class="form-select">
                    <option value="" selected disabled>Selecione um tipo de serviço:</option>
                    <option value="Doméstico">Doméstico</option>
                    <option value="Reforma">Reforma</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Orçamento (R$):</label>
                <input type="number" step="0.01" id="orcamento" name="orcamento" class="form-control" placeholder="0.00" required>
            </div>
            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Descrição:</label>
                <input type="text" id="descricion" class="form-control" placeholder="Digite a descrição do serviço:">
            </div>

            <div class="mb-4">
                <label for="data_pub" class="form-label fw-semibold">Data de publicação:</label>
                <input type="date" id="data_pub" class="form-control" placeholder="AAAA-MM-DD">
            </div>

            <!-- BOTÕES -->
            <div class="d-flex justify-content-between">
                <button id="enviar" class="btn btn-success w-50 me-2 fw-semibold">Cadastrar</button>
                <button id="voltar" class="btn btn-danger w-50 fw-semibold">Voltar</button>
            </div>
        </div>
    </main>
    <!-- FOOTER -->
    <footer class="bg-white border-top py-3 text-center">
        <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
        <div>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-facebook"></i>Facebook</a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-instagram"></i>Instagram</a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-linkedin"></i>Linkedin</a>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.js"></script>
    <script src="../js/prestadores_novo.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
