<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../../home/css/app.css?v=fotos" rel="stylesheet">
</head>

<body>
    <div class="site-shell">

        <nav class="navbar navbar-expand-sm bg-white shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand" href="../../../home/html/index.html">
                    <span class="brand-mark"><i class="bi bi-tools"></i></span>ConsertaJá
                </a>
            </div>
        </nav>

        <main class="auth-main">
            <div class="form-card">
                <div class="form-header">
                    <span class="icon-box mb-3"><i class="bi bi-briefcase"></i></span>
                    <h2 class="fw-bold mb-2">Novo serviço</h2>
                    <p class="mb-0">Preencha as informações para publicar sua oferta.</p>
                </div>

                <div class="form-body bg-white">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome do serviço</label>
                        <input type="text" id="nome" class="form-control"
                            placeholder="Ex: Instalação elétrica residencial">
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea id="descricao" class="form-control"
                            placeholder="Descreva o serviço, experiência, prazo e diferenciais"></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="tipo" class="form-label">Categoria</label>
                            <select id="tipo" class="form-select">
                                <option value="" selected disabled>Selecione uma categoria</option>
                                <option value="Eletrica">Elétrica</option>
                                <option value="Limpeza">Limpeza</option>
                                <option value="Informatica">Informática</option>
                                <option value="Pintura">Pintura</option>
                                <option value="Encanamento">Encanamento</option>
                                <option value="Montagem">Montagem</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="valor" class="form-label">Valor</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" step="0.01" min="0" id="valor" class="form-control"
                                    placeholder="150.00">
                            </div>
                        </div>
                    </div>

                    <div class="my-4">
                        <label for="localidade" class="form-label">Localidade</label>
                        <input type="text" id="localidade" class="form-control" placeholder="Ex: Curitiba - PR">
                    </div>

                    <div class="mb-4">
                        <label for="fotos" class="form-label">Fotos de serviços ou catálogo (opcional)</label>
                        <input type="file" id="fotos" class="form-control" accept="image/*" multiple>
                        <div class="form-text">Use para mostrar trabalhos anteriores ou exemplos do que você oferece.
                        </div>
                    </div>

                    <div class="d-flex justify-content-between gap-2 action-row">
                        <button id="enviar" class="btn btn-brand btn-main w-50">
                            <i class="bi bi-check-circle me-1"></i>Cadastrar
                        </button>
                        <button id="voltar" class="btn btn-outline-danger btn-main w-50">
                            <i class="bi bi-arrow-left me-1"></i>Voltar
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer py-3 text-center">
            <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../js/prestadores_novo.js?v=fotos"></script>
        <script src="../js/valida_sessao.js?v=origem"></script>
    </div>
</body>

</html>
