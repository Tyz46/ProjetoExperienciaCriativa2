<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços Oferecidos - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../../home/css/app.css?v=filtros" rel="stylesheet">
</head>
<body>
<div class="site-shell">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="../../../home/html/index.html">
                <span class="brand-mark"><i class="bi bi-tools"></i></span>ConsertaJá
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuServicos">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuServicos">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <button type="button" class="nav-link dropdown-toggle border-0 bg-transparent" data-bs-toggle="dropdown">
                            Serviços
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="../html/prestador.html">Oferecendo</a></li>
                            <li><a class="dropdown-item" href="../../contratantes/html/contratante.html">Contratando</a></li>
                        </ul>
                    </li>
                </ul>

                <button class="btn btn-outline-danger px-3" id="logoff">Sair</button>
            </div>
        </div>
    </nav>

    <main class="app-main container py-5">
        <div class="page-heading">
            <div>
                <p class="section-kicker">Prestadores</p>
                <h1 class="page-title">Serviços oferecidos</h1>
                <p class="text-secondary mb-0">Cadastre e gerencie os serviços que você quer oferecer.</p>
            </div>
            <button id="novo" class="btn btn-brand btn-main">
                <i class="bi bi-plus-circle me-1"></i>Novo serviço
            </button>
        </div>

        <section class="filter-box mb-4">
            <button class="filter-toggle" type="button" id="abrirFiltros" aria-expanded="false" aria-controls="filtrosPainel">
                <span><i class="bi bi-funnel me-2"></i>Filtros de pesquisa</span>
                <i class="bi bi-chevron-down filter-toggle-icon"></i>
            </button>

            <div class="filter-panel" id="filtrosPainel" hidden>
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="filtroDistancia" class="form-label">Distância máxima</label>
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <input type="range" id="filtroDistancia" class="form-range" min="1" max="100" step="1" value="25" aria-label="Distância máxima">
                            <span id="filtroDistanciaValor">25 km</span>
                        </div>
                        <div class="text-muted"><small id="localizacaoStatus">Aguardando permissão de localização...</small></div>
                    </div>

                    <div class="col-md-4">
                        <label for="filtroTipo" class="form-label">Tipo de trabalho</label>
                        <select id="filtroTipo" class="form-select">
                            <option value="">Todos os tipos</option>
                            <option value="Eletrica">El&eacute;trica</option>
                            <option value="Limpeza">Limpeza</option>
                            <option value="Informatica">Inform&aacute;tica</option>
                            <option value="Pintura">Pintura</option>
                            <option value="Encanamento">Encanamento</option>
                            <option value="Montagem">Montagem</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <div class="d-flex justify-content-between gap-2">
                            <span class="form-label mb-0">Faixa de pre&ccedil;o</span>
                            <span class="filter-price-label" id="filtroPrecoValor">Todos os pre&ccedil;os</span>
                        </div>
                        <div class="filter-range-stack">
                            <span class="filter-range-fill" aria-hidden="true"></span>
                            <input type="range" id="filtroPrecoMin" class="form-range filter-range filter-range-min" min="0" max="0" step="10" value="0" aria-label="Pre&ccedil;o m&iacute;nimo" disabled>
                            <input type="range" id="filtroPrecoMax" class="form-range filter-range filter-range-max" min="0" max="0" step="10" value="0" aria-label="Pre&ccedil;o m&aacute;ximo" disabled>
                        </div>
                        <div class="filter-range-labels">
                            <span id="filtroPrecoMinimo">R$ 0</span>
                            <span id="filtroPrecoMaximo">Sem valores</span>
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-end">
                        <button class="btn btn-outline-secondary btn-sm" type="button" id="limparFiltros">Limpar filtros</button>
                    </div>
                </div>
            </div>
        </section>

        <div id="lista" class="row g-4"></div>
    </main>

    <footer class="footer py-3 text-center mt-5">
        <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/prestadores.js?v=filtros"></script>
    <script src="../js/valida_sessao.js?v=origem"></script>
</div>
</body>
</html>
