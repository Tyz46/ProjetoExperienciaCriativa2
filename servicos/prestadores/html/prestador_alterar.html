<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Serviços - ConsertaJá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">ConsertaJá</a>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-success">Alterar Serviço</h2>
                <p class="text-muted">Atualize as informações do Serviço abaixo</p>
            </div>

            <!-- FORMULÁRIO -->
            <input type="hidden" id="id">

            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Nome</label>
                <input type="text" id="nome" class="form-control" placeholder="Digite o nome do serviço">
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label fw-semibold">Descrição</label>
                <input type="text" id="descricao" class="form-control" placeholder="Que tipo de trabalho você está oferendo?">
            </div>
            
            <div class="mb-3">
                <label for="preco" class="form-label fw-semibold">Preço R$</label>
                <input type="number" id="preco" class="form-control" placeholder="0.00" required>
            </div>

            <div class="mb-3">
                <label for="data_publicacao" class="form-label fw-semibold">Data de Publicação</label>
                <input type="date" id="data_publicacao" class="form-control">
            </div>

            <!-- BOTÕES -->
            <div class="d-flex justify-content-between">
                <button id="enviar" class="btn btn-success w-50 me-2 fw-semibold">Salvar Alterações</button>
                <button id="voltar" class="btn btn-danger w-50 fw-semibold">Voltar</button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-top py-3 text-center">
        <p class="mb-1 text-secondary">© 2025 ConsertaJá. Todos os direitos reservados.</p>
        <div>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-facebook"></i></a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-instagram"></i></a>
            <a href="#" class="btn btn-outline-success btn-sm mx-1"><i class="bi bi-linkedin"></i></a>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.js"></script>
    <script src="../js/prestadores_alterar.js"></script>
    <script src="../js/valida_sessao.js"></script>
</body>
</html>
